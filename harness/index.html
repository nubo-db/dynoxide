<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dynoxide wasm-sqlite smoke test</title>
    <!--
      Preview browser harness for the wasm-sqlite backend.

      This loads the SAME bundled Worker (dist/dynoxide-worker.js) that ships to
      production consumers, so a green harness means the shipping artefact works
      - not a parallel build. The engine runs in the Worker (wa-sqlite needs
      OPFS sync access handles, which are Worker-only); this page drives it over
      a message RPC.

      Build the dist/ first (from the repo root):
        npm install
        npm run build:wasm        # or: npm run build:wasm:dev

      Then serve the repo root over http and open /harness/ in a browser:
        python3 -m http.server 8081
        open http://localhost:8081/harness/

      localhost is a secure context, so OPFS is available without COOP/COEP.
    -->
  </head>
  <body>
    <h1>dynoxide wasm-sqlite smoke test</h1>
    <pre id="out">running...</pre>
    <script type="module">
      const out = document.getElementById("out");
      const worker = new Worker("/dist/dynoxide-worker.js", { type: "module" });

      function call(op, payload) {
        return new Promise((resolve, reject) => {
          const id = Math.random().toString(36).slice(2);
          const handler = (event) => {
            if (event.data.id !== id) return;
            worker.removeEventListener("message", handler);
            event.data.ok
              ? resolve(event.data.result)
              : reject(new Error(event.data.error));
          };
          worker.addEventListener("message", handler);
          worker.postMessage({ id, op, payload });
        });
      }

      try {
        const smoke = await call("smoke");
        const index = await call("index");
        const errors = await call("errors");
        out.textContent =
          "PASS (engine in Worker, OPFS)\nsmoke: " +
          smoke +
          "\nindex: " +
          index +
          "\nerrors: " +
          errors;
        window.__SMOKE_RESULT__ = { ok: true, smoke, index, errors };
      } catch (e) {
        out.textContent = "FAIL\n" + ((e && e.stack) || e);
        window.__SMOKE_RESULT__ = { ok: false, error: String(e) };
      }
    </script>
  </body>
</html>
