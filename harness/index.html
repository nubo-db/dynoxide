<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dynoxide wasm-sqlite smoke test</title>
    <!--
      Preview browser harness for the wasm-sqlite backend.

      This loads the SAME bundled Worker (dist/dynoxide-worker.js) that ships to
      production consumers, so a green harness means the shipping artefact works
      - not a parallel build. The engine runs in the Worker (wa-sqlite needs
      OPFS sync access handles, which are Worker-only); this page drives it over
      a message RPC, exercising the operation-level `execute` API end to end.

      Build the dist/ first (from the repo root):
        npm install
        npm run build:wasm        # or: npm run build:wasm:dev

      Then serve the repo root over http and open /harness/ in a browser:
        python3 -m http.server 8081
        open http://localhost:8081/harness/

      localhost is a secure context, so OPFS is available without COOP/COEP.
    -->
  </head>
  <body>
    <h1>dynoxide wasm-sqlite execute harness</h1>
    <pre id="out">running...</pre>
    <script type="module">
      const out = document.getElementById("out");
      const worker = new Worker("/dist/dynoxide-worker.js", { type: "module" });

      function call(op, payload) {
        return new Promise((resolve, reject) => {
          const id = Math.random().toString(36).slice(2);
          const handler = (event) => {
            if (event.data.id !== id) return;
            worker.removeEventListener("message", handler);
            event.data.ok
              ? resolve(event.data.result)
              : reject(new Error(event.data.error));
          };
          worker.addEventListener("message", handler);
          worker.postMessage({ id, op, payload });
        });
      }

      // Run one DynamoDB operation through the execute RPC, parsing the
      // response JSON the engine returns.
      const exec = async (op, request) =>
        JSON.parse(await call("execute", { op, request }));

      const TABLE = "HarnessMusic";

      try {
        // Boot: open the engine and read the contract descriptor.
        const descriptor = JSON.parse(await call("open", { name: "harness.db" }));

        // OPFS persists across runs, so drop any table left by a prior run.
        try {
          await exec("DeleteTable", { TableName: TABLE });
        } catch {
          /* first run: table does not exist yet */
        }

        await exec("CreateTable", {
          TableName: TABLE,
          KeySchema: [
            { AttributeName: "artist", KeyType: "HASH" },
            { AttributeName: "song", KeyType: "RANGE" },
          ],
          AttributeDefinitions: [
            { AttributeName: "artist", AttributeType: "S" },
            { AttributeName: "song", AttributeType: "S" },
          ],
          BillingMode: "PAY_PER_REQUEST",
        });

        for (const [song, genre] of [["s1", "rock"], ["s2", "jazz"], ["s3", "rock"]]) {
          await exec("PutItem", {
            TableName: TABLE,
            Item: {
              artist: { S: "a" },
              song: { S: song },
              genre: { S: genre },
            },
          });
        }

        const query = await exec("Query", {
          TableName: TABLE,
          KeyConditionExpression: "artist = :a",
          ExpressionAttributeValues: { ":a": { S: "a" } },
        });

        const scan = await exec("Scan", {
          TableName: TABLE,
          FilterExpression: "genre = :g",
          ExpressionAttributeValues: { ":g": { S: "rock" } },
        });

        const ok = query.Count === 3 && scan.Count === 2 && scan.ScannedCount === 3;
        out.textContent =
          (ok ? "PASS" : "FAIL") +
          " (engine in Worker, OPFS, execute API)\n" +
          "contract: " + JSON.stringify(descriptor) + "\n" +
          "query.Count: " + query.Count + "\n" +
          "scan.Count / ScannedCount: " + scan.Count + " / " + scan.ScannedCount +
          "  (filtered scan reads more than it returns)";
        window.__SMOKE_RESULT__ = { ok, descriptor, query, scan };
      } catch (e) {
        out.textContent = "FAIL\n" + ((e && e.stack) || e);
        window.__SMOKE_RESULT__ = { ok: false, error: String(e) };
      }
    </script>
  </body>
</html>
